events {
    worker_connections 2048;
}

http {
    upstream api {
        server api-1:8080;
        server api-2:8080;
        server api-3:8080;
        keepalive 32;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}